# Local development stack — no real GCP calls.
# Upload service writes images to ./local-uploads and uses the Firestore emulator.
services:
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8081 --project=visionlog-local
    ports:
      - "8081:8081"

  upload-service:
    build: ./services/upload-service
    ports:
      - "8080:8080"
    environment:
      ENVIRONMENT: local
      GCP_PROJECT_ID: visionlog-local
      FIRESTORE_EMULATOR_HOST: firestore-emulator:8081
      FIRESTORE_COLLECTION: predictions
      LOCAL_API_KEY: dev-key-12345
      LOCAL_UPLOAD_DIR: /tmp/uploads
      LOG_LEVEL: INFO
    volumes:
      - ./local-uploads:/tmp/uploads
    depends_on:
      - firestore-emulator

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_API_KEY: dev-key-12345
    volumes:
      - ./frontend:/app
